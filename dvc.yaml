stages:
  load_data:
    cmd: python src/data_load.py
    deps:
    - data/raw/data.csv
    - src/data_load.py
    outs:
    - data/processed/data.csv
  preprocess:
    cmd: python src/preprocess.py
    deps:
    - data/processed/data.csv
    - src/preprocess.py
    outs:
    - data/processed/test.csv
    - data/processed/train.csv
  train:
    cmd: python src/train.py
    deps:
    - data/processed/train.csv
    - src/train.py
    outs:
    - model.pkl
    params:
    - train.max_depth
    - train.min_samples_split
    - train.n_estimators
    - train.random_state
  evaluate:
    cmd: python src/evaluate.py
    deps:
    - data/processed/test.csv
    - model.pkl
    - src/evaluate.py
    metrics:
    - metrics.json:
        cache: false
